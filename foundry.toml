[profile.default]
src = "src"
out = "out"
libs = ["lib"]
libraries = ["lib/pyth-crosschain/target_chains/ethereum/sdk/solidity/PythUtils.sol:PythUtils:0x6039565f9ff755754e9c52b6dfe4ab7ba6db2957"]
evm_version = "shanghai"
via_ir = false
optimizer_runs = 200
fs_permissions = [{ access = "read", path = "./pythPriceFeedIds.json"}]

# Pool deployment — Shanghai EVM (DclexPool doesn't need tstore/tload).
# DclexRouter.sol is skipped because v4-core assembly uses tstore/tload which
# require evm_version = "cancun" at the source level.
[profile.pool-deploy]
src = "src"
out = "out"
libs = ["lib"]
libraries = ["lib/pyth-crosschain/target_chains/ethereum/sdk/solidity/PythUtils.sol:PythUtils:0x6039565f9ff755754e9c52b6dfe4ab7ba6db2957"]
evm_version = "shanghai"
via_ir = false
optimizer_runs = 200
fs_permissions = [{ access = "read", path = "./pythPriceFeedIds.json"}]
skip = [
    "src/DclexRouter.sol",
    "script/HelperConfig.s.sol",
    "script/InitializeUniswapV4Pool.s.sol",
    "script/InitializePool.s.sol",
    "script/DeployDclexRouterWithPools.s.sol",
    "script/UpdatePrice.s.sol"
]

# Router deployment — Shanghai EVM, no MCOPY.
# DclexRouter only imports v4-core interfaces (no tstore/tload).
# Scripts that pull in PoolManager implementation must be skipped.
[profile.router-deploy]
src = "src"
out = "out"
libs = ["lib"]
libraries = ["lib/pyth-crosschain/target_chains/ethereum/sdk/solidity/PythUtils.sol:PythUtils:0x6039565f9ff755754e9c52b6dfe4ab7ba6db2957"]
evm_version = "shanghai"
via_ir = false
optimizer_runs = 200
fs_permissions = [{ access = "read", path = "./pythPriceFeedIds.json"}]
skip = [
    "script/HelperConfig.s.sol",
    "script/InitializeUniswapV4Pool.s.sol",
    "script/InitializePool.s.sol",
    "script/InitializeAllPools.s.sol",
    "script/DeployDclexRouterWithPools.s.sol",
    "script/UpdatePrice.s.sol"
]

[rpc_endpoints]
local = "http://127.0.0.1:8545"
sepolia = "${SEPOLIA_RPC_URL}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }
