# Default profile — compiles everything including v4-core.
# evm_version = "cancun" required because v4-core uses tstore/tload.
# via_ir = false prevents MCOPY opcode generation (Shanghai-safe bytecode).
[profile.default]
src = "src"
out = "out"
libs = ["lib"]
libraries = ["lib/pyth-crosschain/target_chains/ethereum/sdk/solidity/PythUtils.sol:PythUtils:0x6039565f9ff755754e9c52b6dfe4ab7ba6db2957"]
evm_version = "cancun"
via_ir = false
optimizer_runs = 200
fs_permissions = [{ access = "read", path = "./pythPriceFeedIds.json"}]

# Pool deployment — skips DclexRouter and router-related scripts.
# DclexPool bytecode doesn't emit Cancun opcodes; safe to deploy on Shanghai.
[profile.pool-deploy]
src = "src"
out = "out"
libs = ["lib"]
libraries = ["lib/pyth-crosschain/target_chains/ethereum/sdk/solidity/PythUtils.sol:PythUtils:0x6039565f9ff755754e9c52b6dfe4ab7ba6db2957"]
evm_version = "cancun"
via_ir = false
optimizer_runs = 200
fs_permissions = [{ access = "read", path = "./pythPriceFeedIds.json"}]
skip = [
    "src/DclexRouter.sol",
    "script/HelperConfig.s.sol",
    "script/InitializeUniswapV4Pool.s.sol",
    "script/InitializePool.s.sol",
    "script/DeployDclexRouterWithPools.s.sol",
    "script/RedeployRouter.s.sol",
    "script/UpdatePrice.s.sol",
]

# Router deployment — skips pool-init scripts that import PoolManager implementation.
# DclexRouter imports only v4-core interfaces (no tstore/tload in its own code).
[profile.router-deploy]
src = "src"
out = "out"
libs = ["lib"]
libraries = ["lib/pyth-crosschain/target_chains/ethereum/sdk/solidity/PythUtils.sol:PythUtils:0x6039565f9ff755754e9c52b6dfe4ab7ba6db2957"]
evm_version = "cancun"
via_ir = false
optimizer_runs = 200
fs_permissions = [{ access = "read", path = "./pythPriceFeedIds.json"}]
skip = [
    "script/HelperConfig.s.sol",
    "script/InitializeUniswapV4Pool.s.sol",
    "script/InitializePool.s.sol",
    "script/InitializeAllPools.s.sol",
    "script/DeployDclexRouterWithPools.s.sol",
    "script/UpdatePrice.s.sol",
]

[rpc_endpoints]
local = "http://127.0.0.1:8545"
sepolia = "${SEPOLIA_RPC_URL}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }
