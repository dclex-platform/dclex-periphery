# Default profile — compiles everything with the IR pipeline.
# via_ir MUST stay true across all profiles: UniswapV3Pool bytecode (and therefore
# `PoolAddress.POOL_INIT_CODE_HASH`) depends on the pipeline, and every deploy
# command in this repo passes --via-ir. A local `forge build` or `forge test`
# without IR would produce a non-IR `out/UniswapV3Pool.sol/*.json` artifact
# whose hash silently disagrees with what the factory actually deploys —
# `test/PoolInitCodeHash.t.sol` would then false-alarm (or worse, false-pass).
[profile.default]
src = "src"
out = "out"
libs = ["lib"]
libraries = ["lib/pyth-crosschain/target_chains/ethereum/sdk/solidity/PythUtils.sol:PythUtils:0x6039565f9ff755754e9c52b6dfe4ab7ba6db2957"]
evm_version = "shanghai"
via_ir = true
optimizer_runs = 200
fs_permissions = [{ access = "read", path = "./pythPriceFeedIds.json"}]
remappings = [
    "@uniswap/v3-core/=lib/v3-core/",
    "@uniswap/v3-periphery/=lib/v3-periphery/",
    "@dclex-protocol/=lib/dclex-protocol/src/",
    "dclex-protocol/=lib/dclex-protocol/",
    "dclex-blockchain/=lib/dclex-blockchain/",
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/",
    "pyth-crosschain/=lib/pyth-crosschain/",
    "base64-sol/=lib/base64/",
]

# SeedLiquidity requires via_ir due to stack depth — skip in default profile
skip = ["script/SeedLiquidity.s.sol"]

# Pool deployment — skips DclexRouter and router-related scripts.
[profile.pool-deploy]
src = "src"
out = "out"
libs = ["lib"]
libraries = ["lib/pyth-crosschain/target_chains/ethereum/sdk/solidity/PythUtils.sol:PythUtils:0x6039565f9ff755754e9c52b6dfe4ab7ba6db2957"]
evm_version = "shanghai"
via_ir = true
optimizer_runs = 200
fs_permissions = [{ access = "read", path = "./pythPriceFeedIds.json"}]
remappings = [
    "@uniswap/v3-core/=lib/v3-core/",
    "@uniswap/v3-periphery/=lib/v3-periphery/",
    "@dclex-protocol/=lib/dclex-protocol/src/",
    "dclex-protocol/=lib/dclex-protocol/",
    "dclex-blockchain/=lib/dclex-blockchain/",
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/",
    "pyth-crosschain/=lib/pyth-crosschain/",
    "base64-sol/=lib/base64/",
]
skip = [
    "src/DclexRouter.sol",
    "script/HelperConfig.s.sol",
    "script/InitializePool.s.sol",
    "script/DeployDclexRouterWithPools.s.sol",
    "script/RedeployRouter.s.sol",
    "script/UpdatePrice.s.sol",
]

# Router deployment — skips pool-init scripts.
[profile.router-deploy]
src = "src"
out = "out"
libs = ["lib"]
libraries = ["lib/pyth-crosschain/target_chains/ethereum/sdk/solidity/PythUtils.sol:PythUtils:0x6039565f9ff755754e9c52b6dfe4ab7ba6db2957"]
evm_version = "shanghai"
via_ir = true
optimizer_runs = 200
fs_permissions = [{ access = "read", path = "./pythPriceFeedIds.json"}]
remappings = [
    "@uniswap/v3-core/=lib/v3-core/",
    "@uniswap/v3-periphery/=lib/v3-periphery/",
    "@dclex-protocol/=lib/dclex-protocol/src/",
    "dclex-protocol/=lib/dclex-protocol/",
    "dclex-blockchain/=lib/dclex-blockchain/",
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/",
    "pyth-crosschain/=lib/pyth-crosschain/",
    "base64-sol/=lib/base64/",
]
skip = [
    "script/HelperConfig.s.sol",
    "script/InitializePool.s.sol",
    "script/InitializeAllPools.s.sol",
    "script/DeployDclexRouterWithPools.s.sol",
    "script/UpdatePrice.s.sol",
]

[rpc_endpoints]
local = "http://127.0.0.1:8545"
sepolia = "${SEPOLIA_RPC_URL}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }
